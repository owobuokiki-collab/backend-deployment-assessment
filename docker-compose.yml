version: "3.9"

services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend-network

  backend:
    build: .
    container_name: muchtodo-backend
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: much_todo_db
      JWT_SECRET_KEY: my-secret-key
      JWT_EXPIRATION_HOURS: 72
      ENABLE_CACHE: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json

    depends_on:
      mongodb:
        condition: service_healthy

    networks:
      - backend-network

volumes:
  mongo_data:

networks:
  backend-network:
